# Herdr configuration — direct bindings, no prefix, zellij-inspired.
#
# Quick reference (details in KEYBINDINGS.md):
#   pane focus      alt+h/j/k/l
#   swap pane       alt+shift+h/j/k/l
#   tabs            ctrl+h (prev) / ctrl+l (next)
#   workspaces      ctrl+j (next) / ctrl+k (prev)
#   agents          ctrl+shift+j (next) / ctrl+shift+k (prev)
#   new tab/ws      alt+n / alt+shift+n
#   split V/H       alt+v / alt+-
#   close/zoom      alt+x / alt+z
#   cycle pane      ctrl+tab
#   resize mode     alt+r  (then hjkl to resize)
#   detach          alt+q
#   toggle sidebar  alt+b
#   copy mode       alt+[

onboarding = false

[theme]
name = "catppuccin"

[keys]
# prefix is defined but never referenced below
prefix = "ctrl+b"

# ────────────────────────────────────────────────────────────────────────────
#  PANE NAVIGATION  — alt+hjkl                                      (pane)
# ────────────────────────────────────────────────────────────────────────────
focus_pane_down  = "alt+j"
focus_pane_up    = "alt+k"
focus_pane_left  = "alt+h"
focus_pane_right = "alt+l"

# ── swap/move panes — alt+shift+hjkl                                (swap)
swap_pane_down  = "alt+shift+j"
swap_pane_up    = "alt+shift+k"
swap_pane_left  = "alt+shift+h"
swap_pane_right = "alt+shift+l"

# ── navigate mode (from the sidebar, uses plain hjkl)               (mode)
navigate_pane_left      = "h"
navigate_pane_down      = "j"
navigate_pane_up        = "k"
navigate_pane_right     = "l"
navigate_workspace_up   = "up"
navigate_workspace_down = "down"

# ────────────────────────────────────────────────────────────────────────────
#  TABS  — ctrl+h/l  (h/l = horizontal axis = moving through tabs)   (tab)
# ────────────────────────────────────────────────────────────────────────────
new_tab       = "alt+n"
previous_tab  = "ctrl+h"
next_tab      = "ctrl+l"
switch_tab    = "ctrl+1..9"
rename_tab    = "alt+shift+t"
close_tab     = "alt+shift+x"

# ────────────────────────────────────────────────────────────────────────────
#  PANES
# ────────────────────────────────────────────────────────────────────────────
split_vertical   = "alt+v"
split_horizontal = "alt+-"
close_pane       = "alt+x"
zoom             = "alt+z"
cycle_pane_next  = "ctrl+tab"

# ── resize mode (enter with alt+r, then hjkl to resize)             (resize)
resize_mode = "alt+r"

# ────────────────────────────────────────────────────────────────────────────
#  WORKSPACES  — ctrl+j/k  (j/k = vertical axis = through lists)     (ws)
# ────────────────────────────────────────────────────────────────────────────
new_workspace      = "alt+shift+n"
next_workspace     = "ctrl+j"
previous_workspace = "ctrl+k"
close_workspace    = "alt+shift+d"
workspace_picker   = "alt+w"
rename_workspace   = "alt+shift+w"
goto               = "alt+g"

# ────────────────────────────────────────────────────────────────────────────
#  AGENTS  — ctrl+shift+j/k  (j/k = vertical, shift escalates)       (agent)
# ────────────────────────────────────────────────────────────────────────────
next_agent         = "ctrl+shift+j"
previous_agent     = "ctrl+shift+k"
focus_agent        = "ctrl+alt+1..9"

# ────────────────────────────────────────────────────────────────────────────
#  OTHER
# ────────────────────────────────────────────────────────────────────────────
detach         = "alt+q"
toggle_sidebar = "alt+b"
copy_mode      = "alt+["

[ui]
sidebar_width = 32
pane_borders = true
pane_gaps = true
confirm_close = true

[ui.toast]
delivery = "herdr"
delay_seconds = 1

[experimental]
pane_history = true

[session]
resume_agents_on_restore = true
